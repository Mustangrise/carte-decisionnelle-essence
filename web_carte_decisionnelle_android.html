<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Carte décisionnelle – Essence</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>

<style>
body { margin:0; font-family:sans-serif; }
#topbar { padding:10px; background:#222; color:#fff; }
#controls { margin-top:8px; line-height:1.6; }
#map { height:90vh; }
#status { margin-top:6px; font-size:14px; opacity:0.85; }
a { color:#9fd3ff; text-decoration:underline; font-size:14px; }
input[type=file] { margin-top:6px; }
</style>
</head>

<body>
<div id="topbar">
  <b>Carte décisionnelle – essence</b>

  <div id="controls">

    <a href="https://regieessencequebec.ca/data/"
       target="_blank"
       rel="noopener noreferrer">
      📥 Télécharger les données officielles (Régie Essence Québec)
    </a>

    <br/>

    <input
      type="file"
      id="fileInput"
      accept=".xlsx"
      onchange="generate()"
    />

    <div id="status"></div>
  </div>
</div>

<div id="map"></div>

<script>
/* ======================= Carte ======================= */
let map = L.map('map').setView([46.5,-71.2],6);
L.tileLayer(
  'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png'
).addTo(map);

let layerGroup = L.layerGroup().addTo(map);

/* ======================= Références ======================= */
const stJerome  = turf.point([-74.003,45.775]);
const laPlaine  = turf.point([-73.748,45.767]);
const steSophie = turf.point([-74.099,45.829]);

function status(msg){
  document.getElementById('status').innerText = msg;
}

/* ======================= Lecture fichier ======================= */
function generate(){
  const input = document.getElementById('fileInput');

  if (!input.files || !input.files.length) {
    status("Aucun fichier sélectionné.");
    return;
  }

  const file = input.files[0];
  status("Lecture du fichier…");
  layerGroup.clearLayers();

  const reader = new FileReader();
  reader.onload = e => {
    const wb = XLSX.read(e.target.result, { type:'array' });
    const data = XLSX.utils.sheet_to_json(
      wb.Sheets[wb.SheetNames[0]]
    );
    processData(data);
  };
  reader.readAsArrayBuffer(file);
}

/* ======================= Traitement ======================= */
function processData(data){
  status("Traitement des données…");

  let pts = [];
  data.forEach(r=>{
    if (!r.Latitude || !r.Longitude || !r['Prix Régulier']) return;

    let prix = parseFloat(
      String(r['Prix Régulier']).replace(/[^0-9.]/g,'')
    );
    if (isNaN(prix)) return;

    if (String(r.Bannière||'').toLowerCase().includes('costco')){
      prix += 5;
    }

    pts.push({...r, prix});
  });

  /* Zone de référence (non affichée) */
  const zone = turf.union(
    turf.buffer(stJerome,15,{units:'kilometers'}),
    turf.buffer(laPlaine,10,{units:'kilometers'})
  );

  pts.forEach(p=>{
    p.inZone = turf.booleanPointInPolygon(
      turf.point([p.Longitude,p.Latitude]),
      zone
    );
  });

  const zin = pts.filter(p=>p.inZone);
  if (!zin.length){
    status("Aucune station dans la zone de référence.");
    return;
  }

  const minZ = Math.min(...zin.map(p=>p.prix));
  const maxZ = Math.max(...zin.map(p=>p.prix));
  const prixMin = Math.min(...pts.map(p=>p.prix));
  const prixMax = Math.max(...pts.map(p=>p.prix));

  /* ======================= Économie ======================= */
  function economieNormalisee(p){
    const d = turf.distance(
      turf.point([p.Longitude,p.Latitude]),
      steSophie,
      {units:'kilometers'}
    );
    if (d<=0) return 0;
    const eco30 = 30*(minZ-p.prix)/100;
    return eco30/(d/100);
  }

  /* ======================= Couleurs ======================= */
  function blueScale(t){
    const a=[173,216,230], b=[0,0,139];
    return `rgb(
      ${Math.round(a[0]+t*(b[0]-a[0]))},
      ${Math.round(a[1]+t*(b[1]-a[1]))},
      ${Math.round(a[2]+t*(b[2]-a[2]))}
    )`;
  }

  function zoneScale(t){
    const s=[
      [0,128,0],
      [255,255,0],
      [255,165,0],
      [255,0,0]
    ];
    const i=Math.min(Math.floor(t*3),2);
    const lt=t*3-i;
    const c1=s[i],c2=s[i+1];
    return `rgb(
      ${Math.round(c1[0]+lt*(c2[0]-c1[0]))},
      ${Math.round(c1[1]+lt*(c2[1]-c1[1]))},
      ${Math.round(c1[2]+lt*(c2[2]-c1[2]))}
    )`;
  }

  const blues = zin.filter(p=>p.prix<minZ).map(economieNormalisee);
  const minB = blues.length ? Math.min(...blues) : 0;
  const maxB = blues.length ? Math.max(...blues) : 1;

  /* ======================= Affichage ======================= */
  pts.forEach(p=>{
    const z = Math.round(
      (prixMax-p.prix)/(prixMax-prixMin)*10000
    );

    let color;
    if (Math.abs(p.prix-minZ)<=0.1){
      color='purple';
    } else if (p.prix<minZ){
      const t=(economieNormalisee(p)-minB)/(maxB-minB||1);
      color=blueScale(Math.max(0,Math.min(1,t)));
    } else if (p.prix>maxZ){
      color='black';
    } else {
      const t=(p.prix-minZ)/(maxZ-minZ);
      color=zoneScale(Math.max(0,Math.min(1,t)));
    }

    if (p.inZone){
      L.circleMarker(
        [p.Latitude,p.Longitude],
        {radius:5,fillOpacity:0.9,stroke:false,
         fillColor:color,zIndexOffset:z}
      ).bindPopup(
        `${p.Nom||''}<br>Prix ajusté : ${p.prix.toFixed(1)}¢`
      ).addTo(layerGroup);
    } else {
      L.marker(
        [p.Latitude,p.Longitude],
        {zIndexOffset:z,
         icon:L.divIcon({
           html:`<div style="width:12px;height:12px;background:${color}"></div>`
         })}
      ).bindPopup(
        `${p.Nom||''}<br>Prix ajusté : ${p.prix.toFixed(1)}¢`
      ).addTo(layerGroup);
    }
  });

  status("Carte générée");
}
</script>
</body>
</html>
